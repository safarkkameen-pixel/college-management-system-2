<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Attendance - CampusHub</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside id="sidebar"></aside>
  <main class="content">
    <div class="topbar">
      <h1>My attendance</h1>
      <p class="muted">Most colleges require at least 75% attendance to sit final exams.</p>
    </div>

    <div class="stat-grid" id="statGrid" style="grid-template-columns: repeat(2, 1fr);">
      <div class="stat-card"><div class="stat-value">…</div><div class="stat-label">Overall attendance</div></div>
      <div class="stat-card"><div class="stat-value">…</div><div class="stat-label">Total classes recorded</div></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3>By subject</h3>
        <table class="table">
          <thead><tr><th>Subject</th><th class="num">Present</th><th class="num">Total</th><th class="num">%</th></tr></thead>
          <tbody id="subjectBody"></tbody>
        </table>
      </div>
      <div class="card">
        <h3>Full history</h3>
        <div style="max-height:360px; overflow-y:auto;">
          <table class="table">
            <thead><tr><th>Date</th><th>Subject</th><th>Status</th></tr></thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
  requireAuth(['student']);
  renderSidebar('student');

  (async () => {
    try {
      const me = await api('/auth/me');
      if (!me.profile) throw new Error('Your student profile could not be found.');
      const data = await api(`/attendance/student/${me.profile.id}`);

      document.getElementById('statGrid').innerHTML = `
        <div class="stat-card"><div class="stat-value">${data.overallPercentage}%</div><div class="stat-label">Overall attendance</div></div>
        <div class="stat-card"><div class="stat-value">${data.totalClasses}</div><div class="stat-label">Total classes recorded</div></div>
      `;

      document.getElementById('subjectBody').innerHTML = data.bySubject.length
        ? data.bySubject.map((s) => `<tr><td>${s.subject}</td><td class="num">${s.present}</td><td class="num">${s.total}</td><td class="num">${s.percentage}%</td></tr>`).join('')
        : '<tr><td colspan="4" class="muted">No records yet.</td></tr>';

      document.getElementById('historyBody').innerHTML = data.records.length
        ? data.records.map((r) => `<tr><td class="num">${formatDate(r.date)}</td><td>${r.subject}</td><td><span class="stamp ${r.status}">${r.status}</span></td></tr>`).join('')
        : '<tr><td colspan="3"><div class="empty-state"><span class="empty-icon">✓</span>No attendance has been marked for you yet.</div></td></tr>';
    } catch (err) {
      alert(err.message);
    }
  })();
</script>
</body>
</html>
