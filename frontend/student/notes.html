<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes - CampusHub</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside id="sidebar"></aside>
  <main class="content">
    <div class="topbar">
      <h1>Notes</h1>
      <p class="muted">Study material your tutors have shared with your department.</p>
    </div>

    <div class="card">
      <div class="inline-form">
        <input type="text" id="subjectFilter" placeholder="Filter by subject (e.g. Data Structures)">
        <button class="btn btn-ghost" id="clearFilter">Clear</button>
      </div>
    </div>

    <div class="card">
      <table class="table">
        <thead><tr><th>Title</th><th>Subject</th><th>Uploaded by</th><th>Size</th><th>Actions</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
  const user = requireAuth(['student']);
  renderSidebar('student');

  async function loadNotes() {
    const subject = document.getElementById('subjectFilter').value.trim();
    const query = `department=${user.department}` + (subject ? `&subject=${encodeURIComponent(subject)}` : '');
    const notes = await api(`/notes?${query}`);
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = notes.length
      ? notes.map((n) => `
        <tr>
          <td>${n.title}</td>
          <td><span class="badge">${n.subject}</span></td>
          <td class="muted">${n.uploadedByName}</td>
          <td class="num">${n.fileSizeKB} KB</td>
          <td><button class="btn btn-ghost" style="padding:6px 12px;" onclick="downloadNote(${n.id}, '${n.originalName.replace(/'/g, "\\'")}')">⭳ Download</button></td>
        </tr>`).join('')
      : '<tr><td colspan="5"><div class="empty-state"><span class="empty-icon">▤</span>No notes have been shared with your department yet.</div></td></tr>';
  }

  document.getElementById('subjectFilter').addEventListener('input', () => {
    clearTimeout(window._debounce);
    window._debounce = setTimeout(loadNotes, 250);
  });
  document.getElementById('clearFilter').addEventListener('click', () => {
    document.getElementById('subjectFilter').value = '';
    loadNotes();
  });

  loadNotes();
</script>
</body>
</html>
