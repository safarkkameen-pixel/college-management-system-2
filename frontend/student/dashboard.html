<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard - CampusHub</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside id="sidebar"></aside>
  <main class="content">
    <div class="topbar">
      <h1 id="greeting">Welcome</h1>
      <p class="muted">Your attendance, marks and overall performance at a glance.</p>
    </div>

    <div class="stat-grid" id="statGrid">
      <div class="stat-card"><div class="stat-value">…</div><div class="stat-label">Attendance</div></div>
      <div class="stat-card"><div class="stat-value">…</div><div class="stat-label">Average marks</div></div>
      <div class="stat-card"><div class="stat-value">…</div><div class="stat-label">Grade</div></div>
      <div class="stat-card"><div class="stat-value">…</div><div class="stat-label">Subjects graded</div></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3>Marks by subject</h3>
        <canvas id="subjectChart" height="220"></canvas>
      </div>
      <div class="card">
        <h3>Insight</h3>
        <p id="insightText" class="muted">Loading your performance summary…</p>
      </div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
  requireAuth(['student']);
  renderSidebar('student');

  (async () => {
    try {
      const me = await api('/auth/me');
      document.getElementById('greeting').textContent = `Welcome, ${me.name}`;
      if (!me.profile) throw new Error('Your student profile could not be found.');

      const studentId = me.profile.id;
      const [perf, marksData] = await Promise.all([
        api(`/students/${studentId}/performance`),
        api(`/marks/student/${studentId}`)
      ]);

      document.getElementById('statGrid').innerHTML = `
        <div class="stat-card"><div class="stat-value">${perf.attendancePercentage}%</div><div class="stat-label">Attendance (${perf.presentCount}/${perf.totalClasses})</div></div>
        <div class="stat-card"><div class="stat-value">${perf.averageMarksPercentage}%</div><div class="stat-label">Average marks</div></div>
        <div class="stat-card"><div class="stat-value">${perf.grade}</div><div class="stat-label">Grade</div></div>
        <div class="stat-card"><div class="stat-value">${perf.subjectsCount}</div><div class="stat-label">Subjects graded</div></div>
      `;

      // Average percentage per subject, for the chart
      const bySubject = {};
      marksData.records.forEach((r) => {
        if (!bySubject[r.subject]) bySubject[r.subject] = [];
        bySubject[r.subject].push(r.percentage);
      });
      const subjects = Object.keys(bySubject);

      if (subjects.length) {
        new Chart(document.getElementById('subjectChart'), {
          type: 'bar',
          data: {
            labels: subjects,
            datasets: [{
              label: 'Average %',
              data: subjects.map((s) => Math.round(bySubject[s].reduce((a, b) => a + b, 0) / bySubject[s].length)),
              backgroundColor: '#D9A435',
              borderRadius: 4
            }]
          },
          options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100 } } }
        });
      } else {
        document.getElementById('subjectChart').replaceWith(Object.assign(document.createElement('p'), { className: 'empty-state', textContent: 'No marks recorded yet.' }));
      }

      let insight = '';
      if (perf.attendancePercentage < 75 && perf.totalClasses > 0) {
        insight = `Your attendance is ${perf.attendancePercentage}%, below the usual 75% requirement. Try to attend more upcoming classes.`;
      } else if (perf.averageMarksPercentage && perf.averageMarksPercentage < 40) {
        insight = `Your average score is ${perf.averageMarksPercentage}%, below the passing mark. Consider reviewing the notes for your weaker subjects.`;
      } else if (perf.averageMarksPercentage >= 75) {
        insight = `Great work - you're averaging ${perf.averageMarksPercentage}% across ${perf.subjectsCount} subject(s), with ${perf.attendancePercentage}% attendance.`;
      } else if (perf.totalClasses === 0 && perf.subjectsCount === 0) {
        insight = "No attendance or marks have been recorded for you yet. Check back after your tutor's first class.";
      } else {
        insight = `You're averaging ${perf.averageMarksPercentage}% across ${perf.subjectsCount} subject(s), with ${perf.attendancePercentage}% attendance. Keep it up!`;
      }
      document.getElementById('insightText').textContent = insight;
    } catch (err) {
      alert(err.message);
    }
  })();
</script>
</body>
</html>
