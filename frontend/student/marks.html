<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Marks - CampusHub</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside id="sidebar"></aside>
  <main class="content">
    <div class="topbar">
      <h1>Marks &amp; performance</h1>
      <p class="muted">Every exam, assignment and quiz score recorded for you.</p>
    </div>

    <div class="stat-grid" id="statGrid" style="grid-template-columns: repeat(2, 1fr);">
      <div class="stat-card"><div class="stat-value">…</div><div class="stat-label">Overall average</div></div>
      <div class="stat-card"><div class="stat-value">…</div><div class="stat-label">Overall result</div></div>
    </div>

    <div class="card">
      <h3>All marks</h3>
      <table class="table">
        <thead><tr><th>Subject</th><th>Exam</th><th class="num">Score</th><th class="num">%</th><th>Result</th></tr></thead>
        <tbody id="marksBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
  requireAuth(['student']);
  renderSidebar('student');

  (async () => {
    try {
      const me = await api('/auth/me');
      if (!me.profile) throw new Error('Your student profile could not be found.');
      const data = await api(`/marks/student/${me.profile.id}`);

      document.getElementById('statGrid').innerHTML = `
        <div class="stat-card"><div class="stat-value">${data.average}%</div><div class="stat-label">Overall average</div></div>
        <div class="stat-card"><div class="stat-value"><span class="stamp ${data.status.toLowerCase()}">${data.status}</span></div><div class="stat-label">Overall result</div></div>
      `;

      document.getElementById('marksBody').innerHTML = data.records.length
        ? data.records.map((r) => `
          <tr>
            <td>${r.subject}</td>
            <td>${r.examType}</td>
            <td class="num">${r.marksObtained} / ${r.totalMarks}</td>
            <td class="num">${r.percentage}%</td>
            <td><span class="stamp ${r.percentage >= 40 ? 'pass' : 'fail'}">${r.percentage >= 40 ? 'Pass' : 'Fail'}</span></td>
          </tr>`).join('')
        : '<tr><td colspan="5"><div class="empty-state"><span class="empty-icon">✎</span>No marks have been entered for you yet.</div></td></tr>';
    } catch (err) {
      alert(err.message);
    }
  })();
</script>
</body>
</html>
