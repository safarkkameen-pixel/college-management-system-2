<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes - CampusHub</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside id="sidebar"></aside>
  <main class="content">
    <div class="topbar">
      <h1>Notes</h1>
      <p class="muted">Upload study material for your department - students can view and download it instantly.</p>
    </div>

    <div class="card">
      <h3>Upload a note</h3>
      <div id="alert" class="alert hidden"></div>
      <form id="uploadForm">
        <div class="grid-2">
          <div>
            <label>Title</label>
            <input type="text" id="title" required placeholder="e.g. Unit 3 - Linked Lists">
            <label>Subject</label>
            <input type="text" id="subject" required placeholder="e.g. Data Structures">
          </div>
          <div>
            <label>File (PDF, DOC, PPT, ZIP - max 15MB)</label>
            <input type="file" id="file" required accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.zip,.xlsx">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top:14px;">Upload</button>
      </form>
    </div>

    <div class="card">
      <h3>Department notes</h3>
      <table class="table">
        <thead><tr><th>Title</th><th>Subject</th><th>Uploaded by</th><th>Size</th><th>Actions</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
  const user = requireAuth(['tutor']);
  renderSidebar('tutor');

  async function loadNotes() {
    const notes = await api(`/notes?department=${user.department}`);
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = notes.length
      ? notes.map((n) => `
        <tr>
          <td>${n.title}</td>
          <td><span class="badge">${n.subject}</span></td>
          <td class="muted">${n.uploadedByName}</td>
          <td class="num">${n.fileSizeKB} KB</td>
          <td>
            <button class="btn-icon" title="Download" onclick="downloadNote(${n.id}, '${n.originalName.replace(/'/g, "\\'")}')">⭳</button>
            ${n.uploadedBy === user.id ? `<button class="btn-icon" title="Delete" onclick="deleteNote(${n.id})">✕</button>` : ''}
          </td>
        </tr>`).join('')
      : '<tr><td colspan="5"><div class="empty-state"><span class="empty-icon">▤</span>No notes uploaded yet.</div></td></tr>';
  }

  document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert('alert');
    const fileInput = document.getElementById('file');
    if (!fileInput.files.length) return;

    const formData = new FormData();
    formData.append('title', document.getElementById('title').value.trim());
    formData.append('subject', document.getElementById('subject').value.trim());
    formData.append('department', user.department);
    formData.append('file', fileInput.files[0]);

    const submitBtn = e.target.querySelector('button');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Uploading...';
    try {
      await api('/notes', { method: 'POST', body: formData, isForm: true });
      e.target.reset();
      loadNotes();
    } catch (err) {
      showAlert('alert', err.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Upload';
    }
  });

  async function deleteNote(id) {
    if (!confirm('Delete this note?')) return;
    try {
      await api(`/notes/${id}`, { method: 'DELETE' });
      loadNotes();
    } catch (err) {
      alert(err.message);
    }
  }

  loadNotes();
</script>
</body>
</html>
