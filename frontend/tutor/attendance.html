<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Attendance - CampusHub</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside id="sidebar"></aside>
  <main class="content">
    <div class="topbar">
      <h1>Mark attendance</h1>
      <p class="muted">Pick a subject and date, then mark each student present or absent.</p>
    </div>

    <div class="card">
      <form id="rosterForm" class="inline-form">
        <input type="text" id="subject" placeholder="Subject" required>
        <input type="date" id="date" required>
        <button type="submit" class="btn btn-primary">Load roster</button>
      </form>
    </div>

    <div id="alert" class="alert hidden"></div>

    <div class="card hidden" id="rosterCard">
      <h3 id="rosterTitle">Roster</h3>
      <div id="rosterList"></div>
      <button class="btn btn-primary" id="saveBtn" style="margin-top:16px;">Save attendance</button>
      <span id="saveStatus" class="muted" style="margin-left:10px;"></span>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
  const user = requireAuth(['tutor']);
  renderSidebar('tutor');

  const marks = {}; // { studentId: 'present' | 'absent' }
  let currentSubject = '';
  let currentDate = '';

  // Pre-fill subject from the tutor's own profile and date with today.
  (async () => {
    try {
      const me = await api('/auth/me');
      if (me.profile && me.profile.subject) document.getElementById('subject').value = me.profile.subject;
    } catch (err) { /* non-fatal */ }
    document.getElementById('date').value = todayStr();
  })();

  document.getElementById('rosterForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert('alert');
    currentSubject = document.getElementById('subject').value.trim();
    currentDate = document.getElementById('date').value;
    try {
      const roster = await api(`/attendance/class?subject=${encodeURIComponent(currentSubject)}&date=${currentDate}`);
      renderRoster(roster);
    } catch (err) {
      showAlert('alert', err.message);
    }
  });

  function renderRoster(roster) {
    document.getElementById('rosterTitle').textContent = `${currentSubject} · ${formatDate(currentDate)} · ${roster.length} students`;
    Object.keys(marks).forEach((k) => delete marks[k]);

    const list = document.getElementById('rosterList');
    if (!roster.length) {
      list.innerHTML = '<div class="empty-state"><span class="empty-icon">☻</span>No students found in your department.</div>';
      document.getElementById('rosterCard').classList.remove('hidden');
      return;
    }

    list.innerHTML = roster.map((r) => {
      if (r.status) marks[r.student.id] = r.status;
      return `
      <div class="roster-row" data-student="${r.student.id}">
        <div>
          <div class="roster-name">${r.student.name}</div>
          <div class="roster-meta">${r.student.rollNo}</div>
        </div>
        <div class="toggle-group">
          <button type="button" class="toggle-btn present ${r.status === 'present' ? 'active' : ''}" onclick="setStatus(${r.student.id}, 'present', this)">Present</button>
          <button type="button" class="toggle-btn absent ${r.status === 'absent' ? 'active' : ''}" onclick="setStatus(${r.student.id}, 'absent', this)">Absent</button>
        </div>
      </div>`;
    }).join('');

    document.getElementById('rosterCard').classList.remove('hidden');
  }

  function setStatus(studentId, status, btn) {
    marks[studentId] = status;
    const row = btn.closest('.roster-row');
    row.querySelectorAll('.toggle-btn').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
  }

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const entries = Object.entries(marks);
    if (!entries.length) {
      alert('Mark at least one student before saving.');
      return;
    }
    const statusEl = document.getElementById('saveStatus');
    statusEl.textContent = 'Saving...';
    try {
      for (const [studentId, status] of entries) {
        await api('/attendance', {
          method: 'POST',
          body: { studentId: Number(studentId), subject: currentSubject, date: currentDate, status }
        });
      }
      statusEl.textContent = `Saved ${entries.length} record(s) ✓`;
      setTimeout(() => (statusEl.textContent = ''), 3000);
    } catch (err) {
      statusEl.textContent = '';
      alert(err.message);
    }
  });
</script>
</body>
</html>
