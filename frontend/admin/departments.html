<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departments - CampusHub</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside id="sidebar"></aside>
  <main class="content">
    <div class="topbar">
      <h1>Departments</h1>
      <p class="muted">Add the departments your college offers, then assign students and tutors to them.</p>
    </div>

    <div class="card">
      <h3 id="formTitle">Add a department</h3>
      <div id="alert" class="alert hidden"></div>
      <form id="deptForm" class="inline-form">
        <input type="hidden" id="deptId">
        <input type="text" id="deptName" placeholder="Department name (e.g. Mechanical Engineering)" required>
        <input type="text" id="deptCode" placeholder="Code (e.g. MECH)" required maxlength="10">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" class="btn btn-ghost hidden" id="cancelEdit">Cancel</button>
      </form>
    </div>

    <div class="card">
      <table class="table">
        <thead><tr><th>Name</th><th>Code</th><th class="num">Students</th><th>Actions</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
  requireAuth(['admin']);
  renderSidebar('admin');

  const form = document.getElementById('deptForm');
  const cancelBtn = document.getElementById('cancelEdit');

  async function load() {
    try {
      const [depts, students] = await Promise.all([api('/departments'), api('/students')]);
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = depts.length
        ? depts.map((d) => `
          <tr>
            <td>${d.name}</td>
            <td><span class="badge">${d.code}</span></td>
            <td class="num">${students.filter((s) => s.department === d.code).length}</td>
            <td>
              <button class="btn-icon" title="Edit" onclick='editDept(${JSON.stringify(d)})'>✎</button>
              <button class="btn-icon" title="Delete" onclick="deleteDept(${d.id})">✕</button>
            </td>
          </tr>`).join('')
        : '<tr><td colspan="4"><div class="empty-state"><span class="empty-icon">▤</span>No departments yet. Add your first one above.</div></td></tr>';
    } catch (err) {
      showAlert('alert', err.message);
    }
  }

  function editDept(d) {
    document.getElementById('formTitle').textContent = 'Edit department';
    document.getElementById('deptId').value = d.id;
    document.getElementById('deptName').value = d.name;
    document.getElementById('deptCode').value = d.code;
    cancelBtn.classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function resetForm() {
    document.getElementById('formTitle').textContent = 'Add a department';
    form.reset();
    document.getElementById('deptId').value = '';
    cancelBtn.classList.add('hidden');
  }

  cancelBtn.addEventListener('click', resetForm);

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert('alert');
    const id = document.getElementById('deptId').value;
    const body = {
      name: document.getElementById('deptName').value.trim(),
      code: document.getElementById('deptCode').value.trim().toUpperCase()
    };
    try {
      if (id) await api(`/departments/${id}`, { method: 'PUT', body });
      else await api('/departments', { method: 'POST', body });
      resetForm();
      load();
    } catch (err) {
      showAlert('alert', err.message);
    }
  });

  async function deleteDept(id) {
    if (!confirm('Delete this department? This cannot be undone.')) return;
    try {
      await api(`/departments/${id}`, { method: 'DELETE' });
      load();
    } catch (err) {
      alert(err.message);
    }
  }

  load();
</script>
</body>
</html>
