<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - CampusHub</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <aside id="sidebar"></aside>
  <main class="content">
    <div class="topbar">
      <h1>Admin dashboard</h1>
      <p class="muted">A full picture of the college, updated live as tutors mark attendance and enter marks.</p>
    </div>

    <div class="stat-grid" id="statGrid">
      <div class="stat-card"><div class="stat-value">…</div><div class="stat-label">Total students</div></div>
      <div class="stat-card"><div class="stat-value">…</div><div class="stat-label">Total tutors</div></div>
      <div class="stat-card"><div class="stat-value">…</div><div class="stat-label">Departments</div></div>
      <div class="stat-card"><div class="stat-value">…</div><div class="stat-label">Passing this term</div></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3>Department-wise students</h3>
        <canvas id="deptChart" height="220"></canvas>
      </div>
      <div class="card">
        <h3>Attendance trend</h3>
        <canvas id="attendanceChart" height="220"></canvas>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3>🏆 Top performers</h3>
        <table class="table">
          <thead><tr><th>Student</th><th>Dept</th><th class="num">Average</th></tr></thead>
          <tbody id="topBody"></tbody>
        </table>
      </div>
      <div class="card">
        <h3>Pass / fail ratio</h3>
        <canvas id="passFailChart" height="220"></canvas>
      </div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
  requireAuth(['admin']);
  renderSidebar('admin');

  (async () => {
    try {
      const data = await api('/analytics/overview');
      const totalGraded = data.passFailRatio.pass + data.passFailRatio.fail;

      document.getElementById('statGrid').innerHTML = `
        <div class="stat-card"><div class="stat-value">${data.totalStudents}</div><div class="stat-label">Total students</div></div>
        <div class="stat-card"><div class="stat-value">${data.totalTutors}</div><div class="stat-label">Total tutors</div></div>
        <div class="stat-card"><div class="stat-value">${data.totalDepartments}</div><div class="stat-label">Departments</div></div>
        <div class="stat-card"><div class="stat-value">${totalGraded ? Math.round((data.passFailRatio.pass / totalGraded) * 100) + '%' : '—'}</div><div class="stat-label">Passing this term</div></div>
      `;

      new Chart(document.getElementById('deptChart'), {
        type: 'bar',
        data: {
          labels: data.departmentWise.map((d) => d.department),
          datasets: [{ label: 'Students', data: data.departmentWise.map((d) => d.count), backgroundColor: '#D9A435', borderRadius: 4 }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
      });

      if (data.attendanceTrend.length) {
        new Chart(document.getElementById('attendanceChart'), {
          type: 'line',
          data: {
            labels: data.attendanceTrend.map((t) => t.date.slice(5)),
            datasets: [{ label: 'Attendance %', data: data.attendanceTrend.map((t) => t.percentage), borderColor: '#3F8F5C', backgroundColor: 'rgba(63,143,92,0.1)', tension: 0.3, fill: true }]
          },
          options: { scales: { y: { beginAtZero: true, max: 100 } } }
        });
      } else {
        document.getElementById('attendanceChart').replaceWith(Object.assign(document.createElement('p'), { className: 'empty-state', textContent: 'No attendance has been marked yet.' }));
      }

      const tbody = document.getElementById('topBody');
      tbody.innerHTML = data.topPerformers.length
        ? data.topPerformers.map((p) => `<tr><td>${p.student.name}</td><td><span class="badge">${p.student.department}</span></td><td class="num">${p.average}%</td></tr>`).join('')
        : '<tr><td colspan="3" class="muted">No exam marks recorded yet.</td></tr>';

      if (totalGraded) {
        new Chart(document.getElementById('passFailChart'), {
          type: 'doughnut',
          data: {
            labels: ['Pass', 'Fail'],
            datasets: [{ data: [data.passFailRatio.pass, data.passFailRatio.fail], backgroundColor: ['#3F8F5C', '#C0533F'] }]
          },
          options: { plugins: { legend: { position: 'bottom' } } }
        });
      } else {
        document.getElementById('passFailChart').replaceWith(Object.assign(document.createElement('p'), { className: 'empty-state', textContent: 'No graded exams yet.' }));
      }
    } catch (err) {
      alert(err.message);
    }
  })();
</script>
</body>
</html>
