<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutors - CampusHub</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside id="sidebar"></aside>
  <main class="content">
    <div class="topbar">
      <h1>Tutors</h1>
      <p class="muted">Create logins for tutors and assign the department and subject each one teaches.</p>
    </div>

    <div class="card">
      <h3 id="formTitle">Add a tutor</h3>
      <div id="alert" class="alert hidden"></div>
      <form id="tutorForm">
        <input type="hidden" id="tutorId">
        <div class="grid-2">
          <div>
            <label>Full name</label>
            <input type="text" id="name" required>
            <label>Email (used to log in)</label>
            <input type="email" id="email" required>
            <label>Temporary password</label>
            <input type="password" id="password" minlength="6" placeholder="Min. 6 characters">
          </div>
          <div>
            <label>Department</label>
            <select id="department" required></select>
            <label>Subject taught</label>
            <input type="text" id="subject" placeholder="e.g. Data Structures" required>
            <label>Phone</label>
            <input type="text" id="phone" placeholder="Optional">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top:14px;">Save tutor</button>
        <button type="button" class="btn btn-ghost hidden" id="cancelEdit">Cancel</button>
      </form>
    </div>

    <div class="card">
      <table class="table">
        <thead><tr><th>Name</th><th>Dept</th><th>Subject</th><th>Email</th><th>Actions</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
  requireAuth(['admin']);
  renderSidebar('admin');

  const form = document.getElementById('tutorForm');
  const cancelBtn = document.getElementById('cancelEdit');

  async function loadDepartmentOptions() {
    const depts = await api('/departments');
    document.getElementById('department').innerHTML = depts.map((d) => `<option value="${d.code}">${d.name} (${d.code})</option>`).join('');
  }

  async function loadTutors() {
    const tutors = await api('/tutors');
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = tutors.length
      ? tutors.map((t) => `
        <tr>
          <td>${t.name}</td>
          <td><span class="badge">${t.department}</span></td>
          <td>${t.subject}</td>
          <td class="muted">${t.email}</td>
          <td>
            <button class="btn-icon" title="Edit" onclick='editTutor(${JSON.stringify(t)})'>✎</button>
            <button class="btn-icon" title="Remove" onclick="deleteTutor(${t.id})">✕</button>
          </td>
        </tr>`).join('')
      : '<tr><td colspan="5"><div class="empty-state"><span class="empty-icon">✎</span>No tutors yet. Add your first one above.</div></td></tr>';
  }

  function editTutor(t) {
    document.getElementById('formTitle').textContent = `Edit ${t.name}`;
    document.getElementById('tutorId').value = t.id;
    document.getElementById('name').value = t.name;
    document.getElementById('email').value = t.email;
    document.getElementById('email').disabled = true;
    document.getElementById('password').disabled = true;
    document.getElementById('password').required = false;
    document.getElementById('password').placeholder = "Leave blank - can't be changed here";
    document.getElementById('department').value = t.department;
    document.getElementById('subject').value = t.subject;
    document.getElementById('phone').value = t.phone || '';
    cancelBtn.classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function resetForm() {
    document.getElementById('formTitle').textContent = 'Add a tutor';
    form.reset();
    document.getElementById('tutorId').value = '';
    document.getElementById('email').disabled = false;
    document.getElementById('password').disabled = false;
    document.getElementById('password').required = true;
    document.getElementById('password').placeholder = 'Min. 6 characters';
    cancelBtn.classList.add('hidden');
  }
  cancelBtn.addEventListener('click', resetForm);

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert('alert');
    const id = document.getElementById('tutorId').value;
    try {
      if (id) {
        await api(`/tutors/${id}`, {
          method: 'PUT',
          body: {
            name: document.getElementById('name').value.trim(),
            department: document.getElementById('department').value,
            subject: document.getElementById('subject').value.trim(),
            phone: document.getElementById('phone').value.trim()
          }
        });
      } else {
        await api('/tutors', {
          method: 'POST',
          body: {
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
            department: document.getElementById('department').value,
            subject: document.getElementById('subject').value.trim(),
            phone: document.getElementById('phone').value.trim()
          }
        });
      }
      resetForm();
      loadTutors();
    } catch (err) {
      showAlert('alert', err.message);
    }
  });

  async function deleteTutor(id) {
    if (!confirm('Remove this tutor and their login? This cannot be undone.')) return;
    try {
      await api(`/tutors/${id}`, { method: 'DELETE' });
      loadTutors();
    } catch (err) {
      alert(err.message);
    }
  }

  (async () => {
    try {
      await loadDepartmentOptions();
      await loadTutors();
    } catch (err) {
      showAlert('alert', err.message);
    }
  })();
</script>
</body>
</html>
