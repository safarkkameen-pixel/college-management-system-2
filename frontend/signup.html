<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - CampusHub</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-brand">🎓 CampusHub</div>
    <p class="auth-subtitle">Create a student or tutor account</p>

    <div id="alert" class="alert hidden"></div>

    <form id="signupForm">
      <label>Full name</label>
      <input type="text" id="name" required autocomplete="name">

      <label>Email</label>
      <input type="email" id="email" required autocomplete="email">

      <label>Password</label>
      <input type="password" id="password" required minlength="6" autocomplete="new-password">

      <label>I am a</label>
      <select id="role" required>
        <option value="student">Student</option>
        <option value="tutor">Tutor</option>
      </select>

      <label>Department</label>
      <select id="department" required></select>

      <div id="tutorOnly" class="hidden">
        <label>Subject you teach</label>
        <input type="text" id="subject" placeholder="e.g. Data Structures">
      </div>

      <div id="studentOnly">
        <label>Roll number (optional)</label>
        <input type="text" id="rollNo" placeholder="e.g. CSE004">
      </div>

      <button type="submit" class="btn btn-primary btn-full">Create account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="/login.html">Log in</a></p>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Load real departments so signup matches what admin has actually set up.
    (async () => {
      try {
        const depts = await api('/departments');
        document.getElementById('department').innerHTML = depts
          .map((d) => `<option value="${d.code}">${d.name} (${d.code})</option>`)
          .join('') || '<option value="">No departments yet - ask an admin to add one</option>';
      } catch (err) {
        showAlert('alert', err.message);
      }
    })();

    const roleSelect = document.getElementById('role');
    roleSelect.addEventListener('change', () => {
      const isTutor = roleSelect.value === 'tutor';
      document.getElementById('tutorOnly').classList.toggle('hidden', !isTutor);
      document.getElementById('studentOnly').classList.toggle('hidden', isTutor);
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert('alert');
      const submitBtn = e.target.querySelector('button');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';
      try {
        const data = await api('/auth/signup', {
          method: 'POST',
          body: {
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
            role: roleSelect.value,
            department: document.getElementById('department').value,
            subject: document.getElementById('subject').value.trim(),
            rollNo: document.getElementById('rollNo').value.trim()
          }
        });
        setSession(data.token, data.user);
        window.location.href = `/${data.user.role}/dashboard.html`;
      } catch (err) {
        showAlert('alert', err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
