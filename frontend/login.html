<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In - CampusHub</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-brand">🎓 CampusHub</div>
    <p class="auth-subtitle">College Management System</p>

    <div id="alert" class="alert hidden"></div>

    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="email" required placeholder="you@college.edu" autocomplete="email">
      <label>Password</label>
      <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
      <button type="submit" class="btn btn-primary btn-full">Log in</button>
    </form>

    <p class="auth-footer">New here? <a href="/signup.html">Create a student or tutor account</a></p>

    <div class="demo-creds">
      <strong>Demo logins</strong> · password for all: password123<br>
      admin@college.edu (Admin)<br>
      ramesh.tutor@college.edu (Tutor · CSE)<br>
      arjun.mehta@college.edu (Student · CSE)
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Already logged in? Skip straight to the dashboard.
    const existing = getUser();
    if (existing && getToken()) window.location.href = `/${existing.role}/dashboard.html`;

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert('alert');
      const submitBtn = e.target.querySelector('button');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';
      try {
        const data = await api('/auth/login', {
          method: 'POST',
          body: {
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
          }
        });
        setSession(data.token, data.user);
        window.location.href = `/${data.user.role}/dashboard.html`;
      } catch (err) {
        showAlert('alert', err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
